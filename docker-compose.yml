services:
  # =====================================================
  # ZOOKEEPER
  # =====================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    ports:
      - "2181:2181"
    networks:
      - fraud-network
    restart: unless-stopped

  # =====================================================
  # KAFKA - مع إعدادات الإنتاج
  # =====================================================
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092
      - KAFKA_LISTENERS=PLAINTEXT://:29092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_DELETE_TOPIC_ENABLE=true
      - KAFKA_CLUSTER_ID=PtIespzeSHCZ5hJJyV-luQ
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      - fraud-network
    restart: unless-stopped
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  # =====================================================
  # KAFKA-UI
  # =====================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
      - KAFKA_CLUSTERS_0_ZOOKEEPER=zookeeper:2181
    ports:
      - "8082:8080"
    networks:
      - fraud-network
    restart: unless-stopped

  # =====================================================
  # INIT-TOPICS (مرة واحدة)
  # =====================================================
  init-topics:
    image: python:3.11-slim
    container_name: init-topics
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./scripts/init_kafka_topics.py:/init_kafka_topics.py
    working_dir: /
    command: >
      sh -c "
        pip install --no-cache-dir kafka-python &&
        python3 /init_kafka_topics.py
      "
    networks:
      - fraud-network
    restart: "no"

  # =====================================================
  # FRONTEND
  # =====================================================
  frontend:
    image: healthcare-fraud-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: frontend
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=${VITE_API_URL:-}
      - VITE_API_PROXY_TARGET=http://app:8000
    depends_on:
      app:
        condition: service_healthy
    networks:
      - fraud-network
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  # =====================================================
  # FASTAPI APP
  # =====================================================
  app:
    build:
      context: ./app
      dockerfile: Dockerfile.app
    container_name: fastapi-app
    ports:
      - "8000:8000"
    environment:
      - DB_SERVER=${DB_SERVER}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PWD=${DB_PWD}
      - DB_DRIVER=${DB_DRIVER}
      - DB_SCHEMA=${DB_SCHEMA}
      - TABLE_CLAIMS=${TABLE_CLAIMS}
      - TABLE_PROVIDER=${TABLE_PROVIDER}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - TOPIC_CLAIMS_RAW=${TOPIC_CLAIMS_RAW}
      - TOPIC_CLAIMS_EVALUATED=${TOPIC_CLAIMS_EVALUATED}
    depends_on:
      kafka:
        condition: service_healthy
      init-topics:
        condition: service_completed_successfully
    networks:
      - fraud-network
    volumes:
      - ./app:/app
      - ./core:/app/core
      - ./services:/app/services
      - ./ML:/app/ML
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  # =====================================================
  # FRAUD-CONSUMER
  # =====================================================
  fraud-consumer:
    build:
      context: ./kafka-consumer
      dockerfile: Dockerfile.consumer
    container_name: fraud-consumer
    depends_on:
      kafka:
        condition: service_healthy
      init-topics:
        condition: service_completed_successfully
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - DB_SERVER=${DB_SERVER}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PWD=${DB_PWD}
      - DB_DRIVER=${DB_DRIVER}
      - DB_SCHEMA=${DB_SCHEMA}
      - TABLE_CLAIMS=${TABLE_CLAIMS}
      - TOPIC_CLAIMS_RAW=${TOPIC_CLAIMS_RAW}
      - TOPIC_CLAIMS_EVALUATED=${TOPIC_CLAIMS_EVALUATED}
      - PYTHONPATH=/app
    networks:
      - fraud-network
    volumes:
      - ./kafka-consumer:/app
      - ./core:/app/core
      - ./ML:/app/ML
      - ./services:/app/services
    restart: unless-stopped

  # =====================================================
  # AIRFLOW-DB
  # =====================================================
  airflow-db:
    image: postgres:15-alpine
    container_name: airflow-db
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=${AIRFLOW_DB_PASSWORD:-airflow}
      - POSTGRES_DB=airflow
      - PGPASSWORD=${AIRFLOW_DB_PASSWORD:-airflow}
    networks:
      - fraud-network
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  # =====================================================
  # AIRFLOW-INIT (تهيئة القاعدة - تُنفذ مرة واحدة)
  # =====================================================
    # =====================================================
  # AIRFLOW-INIT (تهيئة القاعدة - تُنفذ مرة واحدة تلقائياً)
  # =====================================================
  airflow-init:
    build:
      context: ./airflow
      dockerfile: Dockerfile.airflow
    container_name: airflow-init
    depends_on:
      airflow-db:
        condition: service_healthy
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-db/airflow
      - AIRFLOW_ADMIN_PASSWORD=${AIRFLOW_ADMIN_PASSWORD:-admin}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY:-change-me-key-12345678}
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY:-tSloV_0Vf9W68b75eM3_LzQj9PqVzI1ZBlmIunXw7F0=}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/scripts:/opt/airflow/scripts
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    entrypoint: ["/bin/bash", "-c"]
    command: |
      echo '============================================================'
      echo '🔧 AIRFLOW INIT - Running Automated Schema Migrations'
      echo '============================================================'
      
      # 1. Initialize backend relational tables
      airflow db init
      
      # 2. Automatically seed the Web UI admin credential profile
      airflow users create \
        --username admin \
        --firstname Admin \
        --lastname User \
        --role Admin \
        --email admin@example.com \
        --password admin || true
        
      echo '✅ Airflow schema and users initialized perfectly!'
    networks:
      - fraud-network
    restart: "no"


  # =====================================================
  # AIRFLOW-WEBSERVER - مع إعدادات الإنتاج
  # =====================================================
  airflow-webserver:
    build:
      context: ./airflow
      dockerfile: Dockerfile.airflow
    container_name: airflow-webserver
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-db/airflow
      - AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE=UTC
      - AIRFLOW__WEBSERVER__COOKIE_SECURE=False
      - AIRFLOW__WEBSERVER__COOKIE_SAMESITE=Lax
      - AIRFLOW_ADMIN_PASSWORD=${AIRFLOW_ADMIN_PASSWORD:-admin}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - PYSPARK_PYTHON=/usr/local/bin/python
      - PYSPARK_DRIVER_PYTHON=/usr/local/bin/python
      - DB_SERVER=${DB_SERVER}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PWD=${DB_PWD}
      - DB_DRIVER=${DB_DRIVER}
      - DB_SCHEMA=${DB_SCHEMA}
      - TABLE_CLAIMS=${TABLE_CLAIMS}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - TOPIC_CLAIMS_RAW=${TOPIC_CLAIMS_RAW}
      - TOPIC_CLAIMS_EVALUATED=${TOPIC_CLAIMS_EVALUATED}
      # ✅ مفاتيح موحدة لجميع المكونات
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY:-change-me}
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY:-change-me}
      - AIRFLOW__API_AUTH__JWT_SECRET=${AIRFLOW__API_AUTH__JWT_SECRET:-change-me}
      - AIRFLOW__LOGGING__LOG_FETCH_TIMEOUT_SEC=30
    ports:
      - "8081:8080"
    networks:
      - fraud-network
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - ./ML:/opt/airflow/ML
      - ./core:/opt/airflow/core
      - ./services:/opt/airflow/services
      - ./spark/jars:/opt/spark/jars
      # ✅ مزامنة الوقت مع المضيف
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    command: webserver -p 8080
    restart: unless-stopped

  # =====================================================
  # AIRFLOW-SCHEDULER - مع إعدادات الإنتاج
  # =====================================================
  airflow-scheduler:
    build:
      context: ./airflow
      dockerfile: Dockerfile.airflow
    container_name: airflow-scheduler
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-db/airflow
      - AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE=UTC
      - AIRFLOW__WEBSERVER__COOKIE_SECURE=False
      - AIRFLOW__WEBSERVER__COOKIE_SAMESITE=Lax
      - AIRFLOW_ADMIN_PASSWORD=${AIRFLOW_ADMIN_PASSWORD:-admin}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - PYSPARK_PYTHON=/usr/local/bin/python
      - PYSPARK_DRIVER_PYTHON=/usr/local/bin/python
      - DB_SERVER=${DB_SERVER}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PWD=${DB_PWD}
      - DB_DRIVER=${DB_DRIVER}
      - DB_SCHEMA=${DB_SCHEMA}
      - TABLE_CLAIMS=${TABLE_CLAIMS}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - TOPIC_CLAIMS_RAW=${TOPIC_CLAIMS_RAW}
      - TOPIC_CLAIMS_EVALUATED=${TOPIC_CLAIMS_EVALUATED}
      # ✅ مفاتيح موحدة
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY:-change-me}
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY:-change-me}
      - AIRFLOW__API_AUTH__JWT_SECRET=${AIRFLOW__API_AUTH__JWT_SECRET:-change-me}
    networks:
      - fraud-network
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - ./ML:/opt/airflow/ML
      - ./core:/opt/airflow/core
      - ./services:/opt/airflow/services
      - ./spark/jars:/opt/spark/jars
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    command: scheduler
    restart: unless-stopped

  # =====================================================
  # REPORTING-DB
  # =====================================================
  reporting-db:
    image: postgres:15-alpine
    container_name: reporting-db
    environment:
      - POSTGRES_USER=${REPORTING_DB_USER:-reporting}
      - POSTGRES_PASSWORD=${REPORTING_DB_PASSWORD:-reporting}
      - POSTGRES_DB=${REPORTING_DB_NAME:-reporting}
    networks:
      - fraud-network
    volumes:
      - reporting-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${REPORTING_DB_USER:-reporting} -d ${REPORTING_DB_NAME:-reporting}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  # =====================================================
  # DBT
  # =====================================================
  dbt:
    build:
      context: ./dbt
      dockerfile: Dockerfile.dbt
    container_name: dbt
    depends_on:
      reporting-db:
        condition: service_healthy
    environment:
      - REPORTING_DB_HOST=${REPORTING_DB_HOST}
      - REPORTING_DB_PORT=${REPORTING_DB_PORT}
      - REPORTING_DB_USER=${REPORTING_DB_USER}
      - REPORTING_DB_PASSWORD=${REPORTING_DB_PASSWORD}
      - REPORTING_DB_NAME=${REPORTING_DB_NAME}
      - REPORTING_DB_SCHEMA=${REPORTING_DB_SCHEMA}
      - DBT_PROFILES_DIR=/app/dbt
    volumes:
      - ./dbt:/app/dbt
      - ./data:/opt/airflow/data
    networks:
      - fraud-network
    command: >
      sh -c "
        while true; do
          if [ -d /opt/airflow/data/gold/claims_enriched ]; then
            echo '🔄 Running dbt transformations (Parquet -> PostgreSQL)...'
            dbt run --profiles-dir . && dbt test --profiles-dir .
          else
            echo '⏳ Waiting for Gold Layer data... (Parquet not found)'
          fi
          echo '⏳ Waiting 10 minutes...'
          sleep 600
        done
      "
    restart: unless-stopped

  # =====================================================
  # METABASE-DB
  # =====================================================
  metabase-db:
    image: postgres:15-alpine
    container_name: metabase-db
    environment:
      - POSTGRES_USER=${METABASE_DB_USER:-metabase}
      - POSTGRES_PASSWORD=${METABASE_DB_PASSWORD:-metabase123}
      - POSTGRES_DB=${METABASE_DB_NAME:-metabase}
    networks:
      - fraud-network
    volumes:
      - metabase-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${METABASE_DB_USER:-metabase} -d ${METABASE_DB_NAME:-metabase}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  # =====================================================
  # METABASE
  # =====================================================
  metabase:
    image: metabase/metabase:v0.48.0
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=metabase
      - MB_DB_PORT=5432
      - MB_DB_USER=metabase
      - MB_DB_PASS=metabase123
      - MB_DB_HOST=metabase-db
      - MB_PUBLIC_SHARING_ENABLED=true
    depends_on:
      metabase-db:
        condition: service_healthy
      reporting-db:
        condition: service_healthy
    networks:
      - fraud-network
    restart: unless-stopped

  # =====================================================
  # METABASE-INIT
  # =====================================================
  metabase-init:
    image: python:3.11-slim
    container_name: metabase-init
    depends_on:
      metabase:
        condition: service_started
      reporting-db:
        condition: service_healthy
    environment:
      - METABASE_URL=${METABASE_URL}
      - MB_ADMIN_EMAIL=${MB_ADMIN_EMAIL}
      - MB_ADMIN_PASSWORD=${MB_ADMIN_PASSWORD}
      - REPORTING_DB_HOST=${REPORTING_DB_HOST}
      - REPORTING_DB_PORT=${REPORTING_DB_PORT}
      - REPORTING_DB_USER=${REPORTING_DB_USER}
      - REPORTING_DB_PASSWORD=${REPORTING_DB_PASSWORD}
      - REPORTING_DB_NAME=${REPORTING_DB_NAME}
    volumes:
      - ./metabase/init_metabase.py:/init_metabase.py
      - ./metabase/requirements.metabase.txt:/requirements.metabase.txt
      - ./.env:/.env
    working_dir: /
    command: >
      sh -c "
        pip install --no-cache-dir -r /requirements.metabase.txt &&
        echo '⏳ Waiting for Metabase to start...' &&
        sleep 30 &&
        echo '🚀 Initializing Metabase with Reporting DB...' &&
        python3 /init_metabase.py
      "
    networks:
      - fraud-network
    restart: "no"

networks:
  fraud-network:
    driver: bridge

volumes:
  kafka-data:
  airflow-db-data:
  reporting-data:
  metabase-data: